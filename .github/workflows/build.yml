name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build (Apple Silicon)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build (Intel)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Prepare artifacts
        run: |
          mkdir dist
          cp target/aarch64-apple-darwin/release/wherefrom dist/wherefrom-aarch64-apple-darwin
          cp target/x86_64-apple-darwin/release/wherefrom dist/wherefrom-x86_64-apple-darwin

      - name: Generate checksums
        run: |
          shasum -a 256 dist/* > dist/sha256.txt
          cat dist/sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/wherefrom-aarch64-apple-darwin
            dist/wherefrom-x86_64-apple-darwin
            dist/sha256.txt